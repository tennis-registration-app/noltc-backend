name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

      # Integration tests run against the live Supabase instance.
      # Fork PRs: secrets are empty strings, tests self-skip via describe.skipIf, vitest exits 0.
      # Note: assign-court and join-waitlist happy-path tests are time-dependent —
      # they may fail if the PR gate runs outside club operating hours (6 AM – 11 PM Central).
      - name: Run integration tests against live Supabase instance
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:integration
        continue-on-error: false
